# ----------------------------------------------------
# HTTP: redirect everything to HTTPS
# ----------------------------------------------------
server {
    listen 80;
    server_name yourdomain.tld;

    return 301 https://$host$request_uri;
}

# ----------------------------------------------------
# HTTPS: main configuration
# ----------------------------------------------------
server {
    listen 443 ssl http2;
    server_name yourdomain.tld;

    root /var/www/fail2ban-report;
    index index.php index.html;

    # SSL-Certs (Let's Encrypt example)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.tld/privkey.pem;

    # ----------------------------------------------------
    # Disable directory listing globally
    # ----------------------------------------------------
    autoindex off;

    # ----------------------------------------------------
    # Block direct access to sensitive file types
    # ----------------------------------------------------
    location ~* \.(sh|ini|log|json)$ {
        deny all;
    }

    # ----------------------------------------------------
    # Protect the .htaccess file itself
    # ----------------------------------------------------
    location ~ /\.ht {
        deny all;
    }

    # ----------------------------------------------------
    # Protect archive/
    # ----------------------------------------------------
    location ^~ /archive/ {
        deny all;
    }

    # ----------------------------------------------------
    # Endpoint protection (/endpoint/)
    # Allow only index.php, update.php, download.php, backsync.php
    # ----------------------------------------------------
    location ^~ /endpoint/ {
        autoindex off;

        # block everything
        location ~ ^/endpoint/ {
            deny all;
        }

        # but allowed php files
        location ~ ^/endpoint/(index|update|download|backsync)\.php$ {
            allow all;
        }
    }

    # ----------------------------------------------------
    # Set UTF-8 as default charset
    # ----------------------------------------------------
    charset utf-8;

    # ----------------------------------------------------
    # Security Headers
    # ----------------------------------------------------
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----------------------------------------------------
    # Basic Authentication (optional)
    # ----------------------------------------------------
    # location / {
    #     auth_basic "Restricted Area";
    #     auth_basic_user_file /var/www/.htpasswd;
    # }

    # ----------------------------------------------------
    # Restrict access by IP (optional)
    # ----------------------------------------------------
    # location / {
    #     allow 192.168.1.1;       # single IP
    #     allow 192.168.1.0/24;    # subnet
    #     deny all;
    # }

    # ----------------------------------------------------
    # Block backup files
    # ----------------------------------------------------
    location ~* \.(bak|old|backup)$ {
        deny all;
    }
}
